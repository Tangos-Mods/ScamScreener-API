services:
  mailpit:
    image: axllent/mailpit:v1.18.5
    container_name: scamscreener-training-hub-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - training_hub_net

  mariadb:
    image: mariadb:11.4
    container_name: scamscreener-training-hub-db
    environment:
      MARIADB_DATABASE: ${TRAINING_HUB_DB_NAME:-scamscreener_hub}
      MARIADB_USER: ${TRAINING_HUB_DB_USER:-scamscreener}
      MARIADB_PASSWORD: ${TRAINING_HUB_DB_PASSWORD:?TRAINING_HUB_DB_PASSWORD must be set}
      MARIADB_ROOT_PASSWORD: ${TRAINING_HUB_DB_ROOT_PASSWORD:?TRAINING_HUB_DB_ROOT_PASSWORD must be set}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./ops/mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./ops/mariadb/ssl:/etc/mysql/ssl:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-u", "root", "-p${TRAINING_HUB_DB_ROOT_PASSWORD:?TRAINING_HUB_DB_ROOT_PASSWORD must be set}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - training_hub_net

  training-hub:
    build: .
    container_name: scamscreener-training-hub
    depends_on:
      mariadb:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    env_file:
      - .env
    environment:
      TRAINING_HUB_DB_DRIVER: mariadb
      TRAINING_HUB_DB_HOST: mariadb
      TRAINING_HUB_DB_PORT: 3306
      TRAINING_HUB_TRUSTED_PROXIES: 172.30.0.10
      TRAINING_HUB_SMTP_HOST: ${TRAINING_HUB_SMTP_HOST:-mailpit}
      TRAINING_HUB_SMTP_PORT: ${TRAINING_HUB_SMTP_PORT:-1025}
    volumes:
      - ./data:/app/data
      - ./ops/mariadb/ssl:/etc/mysql/ssl:ro
    restart: unless-stopped
    networks:
      - training_hub_net

  caddy:
    image: caddy:2.8
    container_name: scamscreener-training-hub-caddy
    depends_on:
      training-hub:
        condition: service_started
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-http://localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      training_hub_net:
        ipv4_address: 172.30.0.10

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:

networks:
  training_hub_net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
