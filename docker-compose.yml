services:
  scamscreener:
    build: .
    container_name: scamscreener
    env_file:
      - .env.production
    environment:
      SCAMSCREENER_EXTRA_TRUSTED_PROXIES: "172.31.255.10"
    volumes:
      - scamscreener_data:/app/data
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.parse, urllib.request; port = os.getenv('PORT', os.getenv('TRAINING_HUB_PORT', '8080')); host = (os.getenv('TRAINING_HUB_ALLOWED_HOSTS', '').split(',')[0].strip() or urllib.parse.urlsplit(os.getenv('TRAINING_HUB_PUBLIC_BASE_URL', '')).hostname or '127.0.0.1'); request = urllib.request.Request(f'http://127.0.0.1:{port}/api/v1/health', headers={'Host': host, 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(request, timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - scamscreener_net

  caddy:
    image: caddy:2.8
    container_name: scamscreener-caddy
    env_file:
      - .env.production
    depends_on:
      scamscreener:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - caddy
        - validate
        - --config
        - /etc/caddy/Caddyfile
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      scamscreener_net:
        ipv4_address: 172.31.255.10

volumes:
  scamscreener_data:
  caddy_data:
  caddy_config:

networks:
  scamscreener_net:
    ipam:
      config:
        - subnet: 172.31.255.0/24
